<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="62%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#161B2C"/>
      <stop offset="60%" stop-color="#0E1220"/>
      <stop offset="100%" stop-color="#070912"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="38%" stop-color="#7DD3FC"/>
      <stop offset="70%" stop-color="#FF9E4A"/>
      <stop offset="100%" stop-color="#FF6BD6"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#440154"/>
      <stop offset="33%" stop-color="#3b528b"/>
      <stop offset="60%" stop-color="#21908d"/>
      <stop offset="80%" stop-color="#5dc863"/>
      <stop offset="100%" stop-color="#fde725"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>

  <!-- stacked weight matrices in perspective (right side) -->
  <g transform="translate(720 220)" opacity="0.92">
    <g stroke="#2c3650" stroke-width="1.1" fill="none" opacity="0.55">
      <!-- six receding layer frames -->
      <g transform="translate(0 0)"   ><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
      <g transform="translate(58 -10)"><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
      <g transform="translate(116 -20)"><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
      <g transform="translate(174 -30)"><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
      <g transform="translate(232 -40)"><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
      <g transform="translate(290 -50)"><polygon points="-150,-118 150,-150 150,118 -150,150" /></g>
    </g>
    <!-- weight cells: small viridis squares scattered on the nearest plane -->
    <g>
      <!-- generated grid on front face -->
      <g transform="translate(0 0)">
        <!-- rows of cells, color sampled along spectrum via opacity bands -->
        <g fill="#21908d"><rect x="-130" y="-100" width="9" height="9" opacity=".8"/><rect x="-96" y="-104" width="9" height="9" opacity=".5"/><rect x="-60" y="-96" width="9" height="9" opacity=".9" fill="#5dc863"/><rect x="-20" y="-100" width="9" height="9" opacity=".7" fill="#3b528b"/><rect x="24" y="-96" width="9" height="9" opacity=".85" fill="#fde725"/><rect x="70" y="-104" width="9" height="9" opacity=".6"/><rect x="110" y="-98" width="9" height="9" opacity=".75" fill="#5dc863"/></g>
        <g fill="#3b528b"><rect x="-128" y="-60" width="9" height="9" opacity=".7"/><rect x="-90" y="-64" width="9" height="9" opacity=".9" fill="#21908d"/><rect x="-52" y="-58" width="9" height="9" opacity=".6"/><rect x="-8" y="-62" width="9" height="9" opacity=".85" fill="#5dc863"/><rect x="36" y="-58" width="9" height="9" opacity=".7" fill="#fde725"/><rect x="82" y="-62" width="9" height="9" opacity=".8"/><rect x="120" y="-56" width="9" height="9" opacity=".65" fill="#21908d"/></g>
        <g fill="#5dc863"><rect x="-132" y="-18" width="9" height="9" opacity=".8"/><rect x="-92" y="-22" width="9" height="9" opacity=".6" fill="#3b528b"/><rect x="-48" y="-16" width="9" height="9" opacity=".9" fill="#fde725"/><rect x="-4" y="-20" width="9" height="9" opacity=".7" fill="#21908d"/><rect x="40" y="-16" width="9" height="9" opacity=".85"/><rect x="86" y="-22" width="9" height="9" opacity=".6" fill="#3b528b"/><rect x="124" y="-14" width="9" height="9" opacity=".75" fill="#fde725"/></g>
        <g fill="#21908d"><rect x="-126" y="24" width="9" height="9" opacity=".7" fill="#fde725"/><rect x="-88" y="20" width="9" height="9" opacity=".85"/><rect x="-44" y="26" width="9" height="9" opacity=".6" fill="#5dc863"/><rect x="2" y="22" width="9" height="9" opacity=".8" fill="#3b528b"/><rect x="46" y="26" width="9" height="9" opacity=".7"/><rect x="92" y="20" width="9" height="9" opacity=".9" fill="#5dc863"/><rect x="128" y="28" width="9" height="9" opacity=".6"/></g>
        <g fill="#3b528b"><rect x="-130" y="64" width="9" height="9" opacity=".75" fill="#5dc863"/><rect x="-86" y="68" width="9" height="9" opacity=".6"/><rect x="-40" y="62" width="9" height="9" opacity=".85" fill="#21908d"/><rect x="6" y="66" width="9" height="9" opacity=".7" fill="#fde725"/><rect x="50" y="62" width="9" height="9" opacity=".8"/><rect x="96" y="68" width="9" height="9" opacity=".65" fill="#21908d"/><rect x="130" y="64" width="9" height="9" opacity=".75" fill="#5dc863"/></g>
      </g>
    </g>
    <!-- token particles streaming through, with glow -->
    <g filter="url(#glow)">
      <circle cx="-220" cy="20" r="3.2" fill="#bfefff"/>
      <circle cx="-150" cy="-30" r="2.6" fill="#FF6BD6"/>
      <circle cx="-70" cy="50" r="3" fill="#A8F0FF"/>
      <circle cx="10" cy="-10" r="2.4" fill="#FF9E4A"/>
      <circle cx="95" cy="35" r="3.1" fill="#bfefff"/>
      <circle cx="180" cy="-22" r="2.5" fill="#7DD3FC"/>
      <circle cx="250" cy="18" r="2.8" fill="#FF6BD6"/>
      <circle cx="320" cy="-34" r="2.4" fill="#A8F0FF"/>
    </g>
    <!-- faint attention links -->
    <g stroke-width="1" opacity="0.5" filter="url(#soft)">
      <line x1="-150" y1="-30" x2="-70" y2="50" stroke="#FF6BD6"/>
      <line x1="10" y1="-10" x2="95" y2="35" stroke="#FF9E4A"/>
      <line x1="180" y1="-22" x2="250" y2="18" stroke="#A8F0FF"/>
    </g>
  </g>

  <!-- title block (left) -->
  <g transform="translate(96 168)">
    <text x="0" y="0" font-size="78" font-weight="700" letter-spacing="-1" fill="url(#title)">LLM Atlas</text>
    <text x="2" y="42" font-size="19" font-weight="500" letter-spacing="3" fill="#8B93AC">A TRANSFORMER, MADE VISIBLE</text>
    <rect x="2" y="64" width="300" height="6" rx="3" fill="url(#spectrum)" opacity="0.9"/>
    <text x="2" y="104" font-size="15" fill="#6B7388" font-family="'JetBrains Mono', Consolas, monospace">tokens · attention · quantization · sampling, live in the browser</text>
    <text x="2" y="150" font-size="13" letter-spacing="2" fill="#5C6480" font-family="'JetBrains Mono', Consolas, monospace">by engineering87</text>
  </g>
</svg>
